onlyBuiltDependencies:
  - edgedriver
  - esbuild
  - geckodriver
  - msw
  - protobufjs

overrides:
  '@smithy/config-resolver@^3': ^4.4.0
  'diff@^7': '^8.0.3'
  'esbuild': '^0.25.0'
  'minimatch@^9': '^9.0.7'


minimumReleaseAge: 4320 # 3 days
minimumReleaseAgeExclude:
  - '@ckeditor/*'
  - '@cksource/*'
  - '*ckeditor5*'

shellEmulator: true
shamefullyHoist: true
preferFrozenLockfile: true
