allowBuilds:
  edgedriver: true
  esbuild: true
  geckodriver: true
  msw: true
  protobufjs: true
  snyk: true

overrides:
  '@typescript-eslint/utils@^8.32': '^8.57.0'
  'diff@^7': '^8.0.3'
  'minimatch@^9': '9.0.7'
  'serialize-javascript@^6': '^7.0.5'
  'uuid@^9': '^14.0.0'
  'ws@^8': '^8.21.0'
  'protobufjs@^7': '^7.6.4'

minimumReleaseAge: 4320 # 3 days
minimumReleaseAgeExclude:
  - '@ckeditor/*'
  - '@cksource/*'
  - '*ckeditor5*'
  - vite

shellEmulator: true
shamefullyHoist: true
preferFrozenLockfile: true
verifyDepsBeforeRun: false
