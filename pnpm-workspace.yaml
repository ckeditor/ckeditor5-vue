allowBuilds:
  edgedriver: true
  esbuild: true
  geckodriver: true
  msw: true
  protobufjs: true
  snyk: true

overrides:
  'diff@^7': '^8.0.3'
  'minimatch@^9': '9.0.7'
  'serialize-javascript@^6': '^7.0.5'
  'uuid@^9': '^14.0.0'
  'ws@^8': '^8.20.1'

minimumReleaseAge: 4320 # 3 days
minimumReleaseAgeExclude:
  - '@ckeditor/*'
  - '@cksource/*'
  - '*ckeditor5*'
  - vite

shellEmulator: true
shamefullyHoist: true
preferFrozenLockfile: true
verifyDepsBeforeRun: false
